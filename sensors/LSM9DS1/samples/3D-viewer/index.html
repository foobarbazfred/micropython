<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js + Web Serial API デモ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        #connectButton {
            position: absolute;
            z-index: 100;
            margin: 10px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="connectButton">RPi Picoと接続</button>
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.151/build/three.module.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 6面を別々の色で塗りつぶした立方体
        const materials = [
            new THREE.MeshBasicMaterial({ color: 0xe74c3c }),  // 右  赤
            new THREE.MeshBasicMaterial({ color: 0x3498db }),  // 左  青
            new THREE.MeshBasicMaterial({ color: 0x2ecc71 }),  // 上  緑
            new THREE.MeshBasicMaterial({ color: 0xf39c12 }),  // 下  オレンジ
            new THREE.MeshBasicMaterial({ color: 0x9b59b6 }),  // 前  紫
            new THREE.MeshBasicMaterial({ color: 0x1abc9c }),  // 後  エメラルド
        ];
        const geometry = new THREE.BoxGeometry();
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        // XYZ軸をcubeの子として追加（cubeと一緒に回転）
        const axisLength = 1.5;
        const xAxis = new THREE.ArrowHelper(
            new THREE.Vector3(1, 0, 0),
            new THREE.Vector3(0, 0, 0),
            axisLength, 0xff0000, 0.2, 0.1  // 赤 X
        );
        const yAxis = new THREE.ArrowHelper(
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(0, 0, 0),
            axisLength, 0x0000ff, 0.2, 0.1  // 青 Y
        );
        const zAxis = new THREE.ArrowHelper(
            new THREE.Vector3(0, 0, 1),
            new THREE.Vector3(0, 0, 0),
            axisLength, 0xffff00, 0.2, 0.1  // 黄 Z
        );

        const axisLengthNeg = 1.5; // 負の方向の長さ

        // 負のX軸（-1, 0, 0）
        const xAxisNeg = new THREE.ArrowHelper(
            new THREE.Vector3(-1, 0, 0), // 向きを反転
            new THREE.Vector3(0, 0, 0),
            axisLengthNeg, 0x880000, 0.1, 0.05 // 少し暗めの赤
        );
        // 負のY軸（0, -1, 0）
        const yAxisNeg = new THREE.ArrowHelper(
            new THREE.Vector3(0, -1, 0), // 向きを反転
            new THREE.Vector3(0, 0, 0),
            axisLengthNeg, 0x000088, 0.1, 0.05 // 少し暗めの青
        );
        // 負のZ軸（0, 0, -1）
        const zAxisNeg = new THREE.ArrowHelper(
            new THREE.Vector3(0, 0, -1), // 向きを反転
            new THREE.Vector3(0, 0, 0),
            axisLengthNeg, 0x888800, 0.1, 0.05 // 少し暗めの黄
        );



        // sceneではなくcubeに追加 → cubeと一緒に回転
        cube.add(xAxis);
        cube.add(yAxis);
        cube.add(zAxis);

        cube.add(xAxisNeg);
        cube.add(yAxisNeg);
        cube.add(zAxisNeg);

        camera.position.set(2, 2, 4);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Web Serial
        document.querySelector("#connectButton").addEventListener("click", async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const reader = port.readable
                    .pipeThrough(new TextDecoderStream())
                    .getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const oneline = value.trim();
                    console.log(oneline);

                    const parts = oneline.split(',').map(Number);
                    if (parts.length === 3 && parts.every(n => !isNaN(n))) {
                        cube.rotation.x = parts[0];
                        cube.rotation.y = parts[1];
                        cube.rotation.z = parts[2];
                    }
                }
            } catch (error) {
                console.error("Serial Error:", error);
            }
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
